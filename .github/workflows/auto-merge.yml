name: Auto Merge Pull Requests

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - main
      - stable-v3

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'hoopstreet'
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Enable Auto-Merge
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}# PHASE 3: Create comprehensive CI/CD workflow
cat << 'EOF' > .github/workflows/ci-cd.yml
name: CI/CD Pipeline

on:
  push:
    branches: [ main, stable-v3 ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, stable-v3 ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install gradio pandas pillow requests
      
      - name: Check app.py syntax
        run: |
          python -m py_compile app.py
          echo "✅ app.py syntax valid"
      
      - name: Test import
        run: |
          python -c "import app; print('✅ app.py imports successfully')"
  
  build-docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable-v3' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tiktok-prompt-generator
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/stable-v3' }}
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-hf:
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable-v3')
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git remote add space https://hoopstreet:${HF_TOKEN}@huggingface.co/spaces/hoopstreet/TikTok-Prompt-Generator
          git push space ${{ github.ref_name }}:main --force
          echo "✅ Deployed to HF Space"
  
  create-release:
    needs: [build-docker, deploy-hf]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## TikTok Prompt Generator Release ${{ github.ref_name }}
            
            ### Features
            - Full AI_TRAINING_CORE implementation
            - Taglish localization with 10+ phrases
            - 11 niche categories
            - 4-card output protocol
            - 1-to-1 shot mapping
            - Random shot timings (2.1s-5.0s)
            - 15-55s duration support
            - SEO titles with 5 hashtags
            
            ### Docker Image
            `docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tiktok-prompt-generator:${{ github.ref_name }}`
            
            ### Hugging Face Space
            https://huggingface.co/spaces/hoopstreet/TikTok-Prompt-Generator
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
