name: Sync to Hugging Face Space

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git remote add space https://hoopstreet:${HF_TOKEN}@huggingface.co/spaces/hoopstreet/TikTok-Prompt-Generator
            git push space main --force || echo "Push failed - space may not exist"
          else
            echo "⚠️ HF_TOKEN not set - skipping deployment"
          fi
