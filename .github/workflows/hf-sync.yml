name: Sync to Hugging Face Space

      
      - name: Prepare HF Space deployment
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ HF_TOKEN not set - skipping deployment"
            exit 1
          fi
          
          TAG="${{ steps.tag.outputs.tag }}"
          
          # Create deployment directory
          mkdir -p deploy_dir
          
          # Copy only the files needed for HF Space
          cp hf.Dockerfile deploy_dir/Dockerfile
          cp README_HF.md deploy_dir/README.md
          
          cd deploy_dir
          
          # Initialize git repo for HF Space
          git init
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add .
          git commit -m "deploy: $TAG"
          
          # Push to Hugging Face Space
          git remote add hf https://hoopstreet:${HF_TOKEN}@huggingface.co/spaces/hoopstreet/TikTok-Prompt-Generator
          git push hf main --force
          
          echo "✅ Deployed to Hugging Face Space with tag: $TAG"
      
      - name: Commit updated hf.Dockerfile back to repo
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add hf.Dockerfile README_HF.md
          git commit -m "chore: update hf.Dockerfile to tag ${{ steps.tag.outputs.tag }}" || echo "No changes to commit"
          git push origin main || echo "Push skipped - may be in different branch"
