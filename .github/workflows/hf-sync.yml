name: Sync and Update HF

on:
  workflow_run:
    workflows: ["Build and Push Versioned Image"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Update hf.Dockerfile Tag
        run: |
          sed -i "s|FROM .*|FROM ${{ secrets.DOCKERHUB_USERNAME }}/tiktok-prompt-generator:${{ github.event.workflow_run.head_branch }}|g" hf.Dockerfile
          
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@hoopstreet.com"
          git config --global user.name "Hoopstreet Bot"
          git remote add hf https://hoopstreet:$HF_TOKEN@huggingface.co/spaces/hoopstreet/TikTok-Prompt-Generator
          git add hf.Dockerfile
          git commit -m "deploy: update image to ${{ github.event.workflow_run.head_branch }}"
          git push hf main --force
