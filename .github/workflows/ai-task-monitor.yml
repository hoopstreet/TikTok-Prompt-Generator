name: AI Task Monitor
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Task Manager
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: python3 .github/scripts/task_manager.py
