name: AI Auto Fix

on:
  workflow_run:
    workflows: ["AI Code Analyzer"]
    types: [completed]
  workflow_dispatch:

jobs:
  generate-fix:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download Analysis Report
        uses: actions/download-artifact@v3
        with:
          name: analysis-report

      - name: Generate Fix with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python .github/scripts/generate_fix.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 AI Auto-Fix: Code improvements"
          title: "AI Auto-Fix: Code improvements"
          body: |
            ## 🤖 AI Generated Fix
            
            This PR was automatically generated by the AI Auto-Fix workflow.
            
            ### Changes:
            - Analyzed code structure
            - Applied improvements
            - Validated against AI_TRAINING_CORE
            
            ### Review Required:
            Please review before merging.
          branch: ai-fix/auto-improvements
          base: main
          labels: ai-generated, needs-review
