name: AI Autonomous Core

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install gradio requests

      - name: Run Auto Fix
        run: python .github/scripts/auto-fix.py

      - name: Run AI Brain
        run: python .github/scripts/ai-brain.py

      - name: Commit changes
        run: |
          git config --global user.name "AI Core"
          git config --global user.email "ai@system.dev"
          git add .
          git diff --cached --quiet || git commit -m "🤖 AI Evolution Update"
          git push
