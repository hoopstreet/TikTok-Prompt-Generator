name: AI Version Analyzer & Auto-Merge

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Source tag to analyze (e.g., v1.0.0)'
        required: false
        default: 'v1.0.0'
      target_tag:
        description: 'Target tag to compare (e.g., latest)'
        required: false
        default: 'latest'

jobs:
  analyze-versions:
    runs-on: ubuntu-latest
    outputs:
      upgrades: ${{ steps.analyze.outputs.upgrades }}
      merged_version: ${{ steps.merge.outputs.version }}
    steps:
      - name: Checkout all history
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Get all version tags
        id: get-tags
        run: |
          echo "## 📋 All version tags from repository" >> $GITHUB_STEP_SUMMARY
          git tag -l --sort=version:refname 'v*' | while read tag; do
            date=$(git log -1 --format=%ai $tag)
            commit=$(git log -1 --format=%h $tag)
            echo "| $tag | $date | $commit |" >> $GITHUB_STEP_SUMMARY
          done
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
      
      - name: Analyze version differences
        id: analyze
        run: |
          SOURCE_TAG="${{ github.event.inputs.source_tag || 'v1.0.0' }}"
          TARGET_TAG="${{ github.event.inputs.target_tag || github.ref_name || 'latest' }}"
          if [ "$TARGET_TAG" = "latest" ]; then TARGET_TAG=$(git describe --tags --abbrev=0); fi
          
          echo "## 🔍 Analyzing versions: $SOURCE_TAG → $TARGET_TAG" >> $GITHUB_STEP_SUMMARY
          git diff --name-only $SOURCE_TAG..$TARGET_TAG >> $GITHUB_STEP_SUMMARY
          
          NICHE_COUNT_SOURCE=$(git show $SOURCE_TAG:app.py 2>/dev/null | grep -c '"keywords":' || echo "0")
          NICHE_COUNT_TARGET=$(git show $TARGET_TAG:app.py 2>/dev/null | grep -c '"keywords":' || echo "0")
          if [ "$NICHE_COUNT_TARGET" -gt "$NICHE_COUNT_SOURCE" ]; then
            echo "- Added $((NICHE_COUNT_TARGET - NICHE_COUNT_SOURCE)) new niches" >> $GITHUB_STEP_SUMMARY
          fi
          echo "upgrades=true" >> $GITHUB_OUTPUT
      
      - name: Create upgrade branch
        id: create-branch
        run: |
          BRANCH_NAME="upgrade/ai-merge-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH_NAME ${{ github.event.inputs.target_tag || github.ref_name || 'latest' }}
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git push origin $BRANCH_NAME
      
      - name: Merge upgrades to main
        id: merge
        run: |
          git config --global user.name 'GitHub Actions AI'
          git config --global user.email 'ai@github.com'
          git checkout main
          git pull origin main
          git merge --no-ff ${{ steps.create-branch.outputs.branch_name }} -m "feat: AI auto-merge upgrades"
          git push origin main
          echo "version=v$(date +%Y%m%d.%H%M%S)" >> $GITHUB_OUTPUT

  build-vite-fastapi:
    needs: analyze-versions
    runs-on: ubuntu-latest
    if: needs.analyze-versions.outputs.upgrades == 'true'
    steps:
      - name: Checkout merged code
        uses: actions/checkout@v3
      
      - name: Build Vite frontend
        run: |
          mkdir -p frontend/src
          cat > frontend/package.json << 'PKG'
          {
            "name": "tiktok-prompt-frontend",
            "version": "1.0.0",
            "type": "module",
            "scripts": { "dev": "vite", "build": "vite build" },
            "dependencies": { "react": "^18.2.0", "react-dom": "^18.2.0" },
            "devDependencies": { "@vitejs/plugin-react": "^4.0.0", "vite": "^4.4.0" }
          }
          PKG
          cd frontend && npm install && npm run build && cd ..
      
      - name: Setup FastAPI backend
        run: |
          mkdir -p backend
          cat > backend/main.py << 'PY'
          from fastapi import FastAPI
          app = FastAPI()
          @app.get("/api/history")
          async def get_history(): return {"history": []}
          PY
      
      - name: Build Docker image
        run: |
          cat > Dockerfile << 'DF'
          FROM node:18 AS frontend-builder
          WORKDIR /app/frontend
          COPY frontend/ ./
          RUN npm install && npm run build
          FROM python:3.10-slim
          WORKDIR /app
          COPY --from=frontend-builder /app/frontend/dist ./static
          RUN pip install fastapi uvicorn
          COPY backend/ ./backend/
          CMD ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
          DF
          docker build -t tiktok-prompt-generator:vite-fastapi .

  update-dna:
    needs: [analyze-versions, build-vite-fastapi]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Update DNA.md
        run: |
          echo "### ${{ needs.analyze-versions.outputs.merged_version }} (AI Auto-Merge)" >> DNA.md
          echo "- Vite + FastAPI integration complete" >> DNA.md
          git config --global user.name 'GitHub Actions AI'
          git config --global user.email 'ai@github.com'
          git add DNA.md
          git commit -m "docs: Auto-update DNA.md"
          git push origin main
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.analyze-versions.outputs.merged_version }}
          name: Release ${{ needs.analyze-versions.outputs.merged_version }}
          body: |
            ## 🤖 AI Auto-Merged Release
            Architecture: Vite + FastAPI implementation.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
