name: AI Multi-Model Support
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      model_priority:
        description: 'Model priority'
        default: 'deepseek'
      force_fix:
        description: 'Force fix generation'
        type: boolean
        default: false

jobs:
  multi-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Dependencies
        run: pip install requests
      - name: Run Multi-Model AI Check
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python .github/scripts/multi_model_ai.py
      - name: Check Model Status
        run: |
          python -c "
          import os
          summary = '## 🤖 Model Status Report\n\n'
          summary += '- ✅ DeepSeek: Configured\n' if os.environ.get('DEEPSEEK_API_KEY') else '- ⚠️ DeepSeek: Missing\n'
          summary += '- ✅ Hugging Face: Configured\n' if os.environ.get('HF_TOKEN') else '- ⚠️ Hugging Face: Missing\n'
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f: f.write(summary)
          "
      - name: Update DNA.md
        run: |
          echo -e "\n### Multi-Model AI Status (v4.2.0)\n- DeepSeek: Active\n- CodeLlama/StarCoder: Available (HF)\n- Auto-fallback: Enabled" >> DNA.md
          git config --global user.name "AI Multi-Model Bot"
          git config --global user.email "ai@hoopstreet.com"
          git add DNA.md
          git commit -m "docs: sync multi-model status" || echo "No changes"
          git push origin main || echo "Push skipped"
