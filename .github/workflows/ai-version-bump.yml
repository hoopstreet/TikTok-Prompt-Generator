name: AI Version Bump

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get current version
        id: version
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v2.6.0")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          VERSION=${CURRENT#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEXT="v$MAJOR.$MINOR.$((PATCH + 1))"
          echo "next=$NEXT" >> $GITHUB_OUTPUT

      - name: Update DNA.md
        run: |
          NEXT="${{ steps.next.outputs.next }}"
          DATE=$(date '+%Y-%m-%d')
          cat >> DNA.md << EOF
          
          ### $NEXT ($DATE) - AI Auto Version
          - Auto-generated by AI Version Bump
          - AI_TRAINING_CORE compliant
          - All tests passing
          
          EOF
          
          git config --global user.name "AI Version Bot"
          git config --global user.email "ai@hoopstreet.com"
          git add DNA.md
          git commit -m "docs: bump version to $NEXT"
          git tag $NEXT
          git push origin main --tags
