name: Build and Push to Docker Hub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Tag version to build (e.g., v4.0.2)'
        required: true
        default: 'v4.0.2'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Get tag version
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building tag: $TAG"
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tiktok-prompt-generator:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tiktok-prompt-generator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image info
        run: |
          echo "✅ Built and pushed: ${{ secrets.DOCKERHUB_USERNAME }}/tiktok-prompt-generator:${{ steps.tag.outputs.tag }}"
          echo "✅ Also tagged as: latest"
