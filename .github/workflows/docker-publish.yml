name: Build and Push to Docker Hub
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Tag version'
        required: true
        default: 'v4.2.2'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Get tag version
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building: $TAG"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tiktok-prompt-generator:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tiktok-prompt-generator:latest
      - name: Save tag info
        run: |
          echo "TAG=${{ steps.tag.outputs.tag }}" > tag_info.txt
      - name: Upload tag info
        uses: actions/upload-artifact@v3
        with:
          name: tag-info
          path: tag_info.txt
