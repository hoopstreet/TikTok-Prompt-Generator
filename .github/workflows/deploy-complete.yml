name: Complete Deployment Pipeline
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Tag version'
        required: true
        default: 'v4.2.2'
jobs:
  docker:
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    with:
      tag_version: ${{ github.event.inputs.tag_version || github.ref_name }}
  hf-sync:
    needs: docker
    uses: ./.github/workflows/hf-sync.yml
    secrets: inherit
    with:
      tag_version: ${{ github.event.inputs.tag_version || github.ref_name }}
